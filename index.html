/* ============================================================
   MAPEAMENTO DAS RESPOSTAS CORRETAS
   ============================================================ */
const correctAnswersMap = {};
questions.forEach(q => {
    q.options.forEach((opt, idx) => {
        if (opt.correct) correctAnswersMap[`q${q.id}`] = String.fromCharCode(65 + idx);
    });
});

/* ============================================================
   EXIBIÇÃO DE MENSAGENS
   ============================================================ */
function showResult(msg, type) {
    const el = document.getElementById("resultMessage");
    el.innerHTML = msg;
    el.className = "result " + type;
    el.style.display = "block";
    el.scrollIntoView({ behavior: "smooth", block: "nearest" });
}

function hideResult() {
    document.getElementById("resultMessage").style.display = "none";
}

/* ============================================================
   ENVIO PARA O APPS SCRIPT
   ============================================================ */
async function sendToGoogle(dataObj) {
    try {
        const response = await fetch(GOOGLE_SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify(dataObj)
        });

        if (!response.ok) {
            throw new Error(`Erro HTTP: ${response.status} ${response.statusText}`);
        }

        const json = await response.json();

        if (json.status === "success") {
            showResult("<strong>✅ Sucesso!</strong> Suas respostas foram registradas com sucesso!", "success");
            document.getElementById("submitBtn").disabled = true;
        } else {
            showResult(
                "<strong>❌ Erro no servidor:</strong> " + (json.message || "Resposta inesperada do Apps Script."),
                "error"
            );
        }
    } catch (e) {
        showResult(
            "<strong>❌ Erro de Conexão:</strong> " + e.message + ". Verifique se o Apps Script está publicado corretamente.",
            "error"
        );
    }
}

/* ============================================================
   INICIALIZAÇÃO
   ============================================================ */
document.addEventListener("DOMContentLoaded", () => {
    const select = document.getElementById("studentName");
    const numField = document.getElementById("studentNumber");
    const gradeField = document.getElementById("studentGrade");
    const container = document.getElementById("questionsContainer");
    const dateField = document.getElementById("currentDate");

    // Data atual
    dateField.value = new Date().toLocaleDateString('pt-BR');

    // Popular lista de alunos
    Object.keys(students).forEach(turma => {
        const group = document.createElement("optgroup");
        group.label = turma;
        students[turma].forEach(s => {
            const opt = document.createElement("option");
            opt.value = `${s.number}|${turma}|${s.name}`;
            opt.textContent = s.name;
            group.appendChild(opt);
        });
        select.appendChild(group);
    });

    // Popular questões
    questions.forEach(q => {
        const block = document.createElement("div");
        block.className = "question-container";
        block.id = "q" + q.id;

        // Monta HTML da questão
        let imgHTML = "";
        if (q.image) {
            imgHTML = `<img src="${q.image}" class="question-image" alt="Imagem da questão ${q.id}" onerror="this.style.display='none'">`;
        }

        block.innerHTML = `
            <p class="question"><strong>${q.id}.</strong> ${q.question}</p>
            ${imgHTML}
            <div class="options"></div>
        `;

        const optBox = block.querySelector(".options");
        q.options.forEach((opt, idx) => {
            const letter = String.fromCharCode(65 + idx);
            const div = document.createElement("div");
            div.className = "option";
            div.dataset.question = q.id;
            div.dataset.letter = letter;
            div.textContent = opt.text;

            div.onclick = () => {
                optBox.querySelectorAll(".option").forEach(o => o.classList.remove("selected"));
                div.classList.add("selected");
                hideResult();
            };

            optBox.appendChild(div);
        });

        container.appendChild(block);
    });

    // Mudança de aluno no select
    select.onchange = () => {
        if (!select.value) {
            numField.value = "";
            gradeField.value = "";
            return;
        }
        const [n, g] = select.value.split("|");
        numField.value = n;
        gradeField.value = g;
        hideResult();
    };

    // Botão limpar
    document.getElementById("clearBtn").onclick = () => {
        document.querySelectorAll(".option.selected").forEach(opt => opt.classList.remove("selected"));
        hideResult();
    };
});

/* ============================================================
   ENVIO FINAL
   ============================================================ */
document.getElementById("submitBtn").onclick = async () => {
    hideResult();

    const select = document.getElementById("studentName");
    if (!select.value) {
        showResult("⚠️ Selecione seu nome antes de enviar.", "error");
        return;
    }

    const [studentNumber, studentGrade, studentName] = select.value.split("|");
    const data = { studentName, studentNumber, studentGrade };

    let correct = 0;
    let allAnswered = true;
    const totalQuestions = questions.length;

    for (let q of questions) {
        const selected = document.querySelector(`#q${q.id} .option.selected`);
        if (!selected) {
            allAnswered = false;
            document.getElementById(`q${q.id}`).scrollIntoView({ behavior: "smooth", block: "center" });
            break;
        }
        const letter = selected.dataset.letter;
        data[`q${q.id}`] = letter;
        if (letter === correctAnswersMap[`q${q.id}`]) correct++;
    }

    if (!allAnswered) {
        showResult("⚠️ Responda todas as questões antes de enviar.", "error");
        return;
    }

    data.finalScore = correct;
    data.percentage = (correct / totalQuestions) * 100;

    showResult(`⏳ Calculando nota... você acertou <strong>${correct}/${totalQuestions}</strong>. Enviando dados...`, "success");

    await sendToGoogle(data);
};
</script>
